function isGoodQA(n){
  if(!n)return false;const s=n.toLowerCase();
  const bad=["do not add","warning","difficult","pushy","ai issues","sent a warning","removed from","unable to resolve","rewrote","flag","suspicious"];
  const good=["good work","great work","reliable","strong","accurate","excellent","billed time correctly","billing is within time","billing looks good","no billing issues","logged time correctly","constructive","organized","5)","4)","3)","attention to detail","responsive"];
  return good.some(p=>s.includes(p))&&!bad.some(p=>s.includes(p));
}
function extractSpecialty(bio){
  const tags=new Set();const b=(bio||"").toLowerCase();
  [["Mathematics",["math","statistics","calculus","algebra","geometry","quantitative","numerical analysis","differential equation","linear algebra"]],
   ["Computer Science",["computer science","software","programming","it support","information technology","web development","coding","data science","machine learning","network","cybersecurity","devops","linux","cloud computing","java","sql","computer engineering"]],
   ["Biological Sciences",["biolog","biochem","microbiol","physiology","ecology","anatomy","genetics","nursing","biomedical","paleontol","geology","earth science","environmental","geotechnical","geochemistry"]],
   ["Physical Sciences",["physics","astrophysic","chemistry","chemical engineering","mechanical engineering"]],
   ["Business",["business","finance","management","marketing","economics","accounting","entrepreneurship","mba","commerce","organizational","taxation","financial analysis","costing"]],
   ["Humanities",["history","philosophy","literature","africana","spanish","language","humanities","theology","world christianity","religion","art history","social studies","hispanic","aesthetics","ethics"]],
   ["Social Sciences",["social science","psychology","sociology","political","forensic","criminal justice","counseling","anthropology","human behavior","social work","geography","criminology","mental health counseling"]],
   ["Education",["education","curriculum","instructional","teaching","pedagog","tesol","esol","esl","teacher training","learning design","instructional design","special education"]],
   ["Communications",["communicat","journalism","media","technical writing","public relations","creative writing","copywriting"]],
   ["Health Sciences",["nursing","health","physical education","dental","mental health","clinical","psychometr"]],
   ["Hospitality",["hospitality","tourism","travel"]],
   ["Law",["law","legal","intellectual property","legislation","compliance","llb"]],
  ].forEach(([tag,kws])=>{if(kws.some(k=>b.includes(k)))tags.add(tag);});
  return [...tags];
}
function courseMatches(course,specialties){
  const c=course.toLowerCase();const sp=specialties.map(x=>x.toLowerCase());
  const m=[
    [["math","algebra","calculus","statistics","geometry","quantitative","numerical","linear algebra","differential eq"],["mathematics"]],
    [["computer","programming","software","coding","it ","information technology","cybersecurity","network","data science","web dev","cloud","devops","linux","java","sql","database"],["computer science"]],
    [["biolog","biochem","microbiol","ecology","anatomy","genetics","life science","geology","earth science","paleontol","geotechnical","environmental science","geochemistry"],["biological sciences"]],
    [["physics","chemistry","chemical","astrophysic","mechanical","physical science"],["physical sciences"]],
    [["business","finance","management","marketing","economics","accounting","entrepreneurship","taxation","organizational","human resource"],["business"]],
    [["history","philosophy","literature","english","humanities","world religion","theology","art history","music","spanish","language arts","africana","ethics","aesthetics","hispanic"],["humanities"]],
    [["psychology","sociology","political","criminal justice","forensic","social science","counseling","geography","anthropology","criminolog"],["social sciences"]],
    [["education","curriculum","instructional","teaching","pedagog","tesol","esl","special education","literacy"],["education"]],
    [["communication","journalism","media","writing","public relations","technical writing","broadcast","rhetoric"],["communications"]],
    [["health","nursing","physical education","dental","mental health","clinical psychology","health science"],["health sciences"]],
    [["hospitality","tourism","travel","hotel"],["hospitality"]],
    [["law","legal","intellectual property","legislation","jurisprudence"],["law"]],
  ];
  return m.some(([kws,req])=>kws.some(k=>c.includes(k))&&req.some(r=>sp.includes(r)))||sp.some(s=>c.includes(s.split(" ")[0])||s.includes(c.split(" ")[0]));
}
function scoreFit(course,c){
  if(!courseMatches(course,c.specialties))return -1;
  const b=(c.bio||"").toLowerCase();
  const stopWords=new Set(["introduction","principles","fundamentals","concepts","survey","applied","college","advanced","basic","general","level","and","the","to","of","in","for","with"]);
  const kws=course.toLowerCase().replace(/[^a-z0-9 ]/g,"").split(/\s+/).filter(w=>w.length>3&&!stopWords.has(w));
  let score=10+kws.reduce((a,k)=>a+(b.includes(k)?5:0),0);
  score+=c.specialties.filter(sp=>courseMatches(course,[sp])).length>1?3:0;
  if(c.goodQA)score+=4;
  if(!c.active)score+=2;
  if(c.bio&&c.bio.length>40)score+=2;
  return score;
}
function parseCourses(text){
  return text.split(/[\n,;]+/).map(s=>s.trim()).filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);
}
const LOW=2;
const STATUS_CONFIG={
  critical:{label:"No contractors",bg:"#F7C1C1",color:"#A32D2D",border:"#A32D2D",action:"Open applications urgently"},
  low:{label:"Low coverage",bg:"#FAC775",color:"#BA7517",border:"#BA7517",action:"Open applications"},
  moderate:{label:"Moderate",bg:"#FAEEDA",color:"#BA7517",border:"#EF9F27",action:"Monitor closely"},
  good:{label:"Good",bg:"#E1F5EE",color:"#1D9E75",border:"#1D9E75",action:"No action needed"},
};
function getCoverageStatus(n){return n===0?"critical":n<=LOW?"low":n<=4?"moderate":"good";}

function App(){
  const [courseText,setCourseText]=useState("");
  const [result,setResult]=useState(null);
  const [activeView,setActiveView]=useState("courses");
  const [filterType,setFilterType]=useState("all");
  const [filterCourse,setFilterCourse]=useState("all");
  const [filterContractor,setFilterContractor]=useState("");
  const [filterStatus,setFilterStatus]=useState("all");
  const [expandedCards,setExpandedCards]=useState({});
  const [collapsedGroups,setCollapsedGroups]=useState({});

  const allData=useMemo(()=>{
    const seen=new Set();
    return RAW.filter(c=>{
      if(!c.bio||c.bio.trim().length<3)return false;
      const k=c.email.toLowerCase();if(seen.has(k))return false;seen.add(k);return true;
    }).map(c=>({...c,specialties:extractSpecialty(c.bio),goodQA:isGoodQA(c.qa)}));
  },[]);

  function runAnalysis(){
    const parsed=parseCourses(courseText);
    if(!parsed.length){alert("Please enter at least one course or subject.");return;}
    const seen=new Set();const primary=[],backup=[];
    allData.forEach(c=>{
      const key=c.email.toLowerCase();if(seen.has(key)||c.flagged)return;
      const matched=parsed.filter(course=>courseMatches(course,c.specialties));
      if(matched.length===0)return;seen.add(key);
      if(!c.cms&&(!c.active||isGoodQA(c.qa)))primary.push({...c,matched});
      else if(c.cms&&(!c.active||isGoodQA(c.qa)))backup.push({...c,matched});
    });
    primary.sort((a,b)=>b.matched.length-a.matched.length||(b.goodQA?1:0)-(a.goodQA?1:0));
    backup.sort((a,b)=>b.matched.length-a.matched.length||(b.goodQA?1:0)-(a.goodQA?1:0));
    setResult({primary,backup,courses:parsed});
    setActiveView("courses");setFilterType("all");setFilterCourse("all");setFilterContractor("");setFilterStatus("all");
    setExpandedCards({});setCollapsedGroups({});
  }

  const topFit=useMemo(()=>{
    if(!result)return{};
    const map={};
    result.courses.forEach(course=>{
      map[course]=[...result.primary,...result.backup]
        .map(c=>({email:c.email,score:scoreFit(course,c)})).filter(x=>x.score>0)
        .sort((a,b)=>b.score-a.score).slice(0,2).map(x=>x.email);
    });
    return map;
  },[result]);

  const coverage=useMemo(()=>{
    if(!result)return[];
    return result.courses.map((course,i)=>{
      const all=[...result.primary,...result.backup].filter(c=>courseMatches(course,c.specialties));
      const top2=topFit[course]||[];
      return{course,pal:PALETTE[i%PALETTE.length],total:all.length,
        primaryCount:result.primary.filter(c=>courseMatches(course,c.specialties)).length,
        backupCount:result.backup.filter(c=>courseMatches(course,c.specialties)).length,
        status:getCoverageStatus(all.length),
        topNames:all.filter(c=>top2.includes(c.email)).map(c=>c.name),index:i};
    });
  },[result,topFit]);

  const shown=useMemo(()=>{
    if(!result)return[];
    let pool=filterType==="primary"?result.primary:filterType==="backup"?result.backup:[...result.primary,...result.backup];
    if(filterCourse!=="all")pool=pool.filter(c=>courseMatches(filterCourse,c.specialties));
    if(filterContractor.trim())pool=pool.filter(c=>c.name.toLowerCase().includes(filterContractor.toLowerCase())||c.bio.toLowerCase().includes(filterContractor.toLowerCase()));
    return pool;
  },[result,filterType,filterCourse,filterContractor]);

  const courseGroups=useMemo(()=>{
    if(!result)return[];
    const list=filterCourse==="all"?result.courses:[filterCourse];
    return list.map(course=>{
      const idx=result.courses.indexOf(course);
      const contractors=shown.filter(c=>courseMatches(course,c.specialties));
      const allForCourse=[...result.primary,...result.backup].filter(c=>courseMatches(course,c.specialties));
      return{course,pal:PALETTE[idx%PALETTE.length],contractors,totalCount:allForCourse.length,status:getCoverageStatus(allForCourse.length)};
    });
  },[result,shown,filterCourse]);

  const flaggedCourses=useMemo(()=>coverage.filter(c=>c.status==="critical"||c.status==="low"),[coverage]);
  const reportFiltered=useMemo(()=>filterStatus==="all"?coverage:coverage.filter(c=>c.status===filterStatus),[coverage,filterStatus]);

  function toggleCard(id){setExpandedCards(p=>({...p,[id]:!p[id]}));}
  function toggleGroup(g){setCollapsedGroups(p=>({...p,[g]:!p[g]}));}

  function ContractorRow({c,pal,groupKey}){
    const id=groupKey+"::"+c.email;const open=!!expandedCards[id];
    const isPrimary=result.primary.some(x=>x.email===c.email);
    const isFit=(topFit[groupKey]||[]).includes(c.email);
    return(
      <div style={{borderRadius:8,background:"#fff",border:`0.5px solid ${isFit?pal.border:"#d3d1c7"}`,marginBottom:6,overflow:"hidden",boxShadow:isFit?`0 0 0 1px ${pal.border}40`:undefined}}>
        <div onClick={()=>toggleCard(id)} style={{padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:4,minHeight:36,borderRadius:2,background:isFit?pal.border:"#d3d1c7",flexShrink:0,alignSelf:"stretch"}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginBottom:2}}>
              <span style={{fontWeight:600,fontSize:13,color:"#1a1a18"}}>{c.name}</span>
              {isFit&&<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,padding:"2px 9px",borderRadius:20,background:pal.border,color:"#fff",fontWeight:700}}>★ Most Fit</span>}
              <span style={{fontSize:10,padding:"2px 7px",borderRadius:3,background:isPrimary?GL:BL,color:isPrimary?G:B,fontWeight:600}}>{isPrimary?"Primary":"Back-up"}</span>
              {c.active&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:3,background:AL,color:AM,fontWeight:600}}>Active</span>}
              {c.goodQA&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:3,background:GL,color:G,fontWeight:600}}>Good QA</span>}
            </div>
            <div style={{fontSize:11,color:"#888780",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.specialties.slice(0,5).join(" · ")||"—"}</div>
          </div>
          <span style={{fontSize:11,color:"#888780",flexShrink:0}}>{open?"▲":"▼"}</span>
        </div>
        {open&&(
          <div style={{borderTop:`0.5px solid ${pal.border}40`,padding:"10px 14px 10px 26px",background:"#f5f5f3"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 16px",fontSize:12,marginBottom:6,color:"#1a1a18"}}>
              <div><span style={{color:"#888780"}}>Email: </span>{c.email}</div>
              <div><span style={{color:"#888780"}}>Residency: </span>{c.residency||"—"}</div>
              <div><span style={{color:"#888780"}}>Wage: </span>{c.wage||"—"}</div>
            </div>
            {c.active&&<div style={{fontSize:12,marginBottom:4,color:"#1a1a18"}}><span style={{color:"#888780"}}>Active: </span>{c.active}</div>}
            {c.bio&&<div style={{fontSize:12,marginBottom:4,lineHeight:1.6,color:"#1a1a18"}}><span style={{color:"#888780"}}>Bio: </span>{c.bio}</div>}
            {c.qa&&<div style={{fontSize:12,padding:"7px 10px",background:"#fff",borderRadius:6,border:"0.5px solid #d3d1c7",color:"#1a1a18"}}><span style={{color:"#888780"}}>QA: </span>{c.qa}</div>}
          </div>
        )}
      </div>
    );
  }

  const card={background:"#fff",borderRadius:10,border:"0.5px solid #d3d1c7",padding:"13px 15px"};
  const btn=(active,color="#1a1a18")=>({fontSize:13,padding:"8px 16px",borderRadius:7,border:`0.5px solid ${active?"#1a1a18":"#d3d1c7"}`,background:active?"#fff":"#f5f5f3",color,cursor:"pointer",fontWeight:active?600:400});

  return(
    <div style={{fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",color:"#1a1a18"}}>
      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:600,margin:"0 0 3px",letterSpacing:"-0.3px"}}>Contractor Analysis & Strategy</h1>
          <p style={{fontSize:12,color:"#888780",margin:0}}>{allData.length} contractors loaded · College Saver Master Contractor Tracking Sheet · Last refreshed: March 14, 2026</p>
        </div>
      </div>

      {/* INPUT */}
      <div style={{...card,marginBottom:14}}>
        <p style={{fontSize:14,fontWeight:600,margin:"0 0 4px"}}>Courses / subjects needed</p>
        <p style={{fontSize:12,color:"#888780",margin:"0 0 10px"}}>Enter one per line, or comma-separated. Supports 20+ courses.</p>
        <textarea value={courseText} onChange={e=>setCourseText(e.target.value)}
          placeholder={"US History\nOrganic Chemistry\nBusiness Management\nIntroduction to Psychology\nCalculus I\n..."}
          rows={8} style={{width:"100%",fontSize:13,padding:"9px 11px",borderRadius:7,border:"0.5px solid #b4b2a9",background:"#f5f5f3",color:"#1a1a18",resize:"vertical",lineHeight:1.6,outline:"none"}}/>
        {courseText.trim()&&<p style={{fontSize:12,color:"#888780",margin:"5px 0 0"}}>{parseCourses(courseText).length} course{parseCourses(courseText).length!==1?"s":""} detected</p>}
      </div>
      <div style={{marginBottom:20}}>
        <button onClick={runAnalysis} style={{fontSize:14,padding:"10px 26px",borderRadius:8,border:"none",background:G,color:"#fff",cursor:"pointer",fontWeight:600,letterSpacing:"0.01em"}}>
          Run analysis
        </button>
      </div>

      {result&&(<>
        {flaggedCourses.length>0&&(
          <div style={{marginBottom:14,padding:"12px 14px",borderRadius:10,background:RL,border:"1px solid #f09595"}}>
            <p style={{fontSize:13,fontWeight:600,color:R,margin:"0 0 7px"}}>⚠ {flaggedCourses.length} course{flaggedCourses.length!==1?"s":""} need immediate attention</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {flaggedCourses.map(({course,total,status})=>(
                <span key={course} style={{fontSize:12,padding:"3px 10px",borderRadius:5,background:status==="critical"?"#F7C1C1":"#FAC775",color:status==="critical"?R:AM,fontWeight:600,border:`0.5px solid ${status==="critical"?R:AM}`}}>
                  {course} — {status==="critical"?"no match":"only "+total}
                </span>
              ))}
            </div>
          </div>
        )}

        <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
          {[["Courses",result.courses.length,"#1a1a18"],["Primary",result.primary.length,G],["Back-up",result.backup.length,B],["Need Action",flaggedCourses.length,flaggedCourses.length>0?R:"#888780"]].map(([l,v,c])=>(
            <div key={l} style={{background:"#f5f5f3",borderRadius:8,padding:"10px 13px",border:"0.5px solid #d3d1c7"}}>
              <div style={{fontSize:11,color:"#888780",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</div>
              <div style={{fontSize:24,fontWeight:700,color:c}}>{v}</div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:0,marginBottom:16,borderRadius:8,overflow:"hidden",border:"0.5px solid #d3d1c7",width:"fit-content"}}>
          {[["courses","Contractor View"],["report","Coverage Report"]].map(([key,label])=>(
            <button key={key} onClick={()=>setActiveView(key)} style={{fontSize:13,padding:"8px 18px",border:"none",background:activeView===key?"#fff":"#f5f5f3",color:activeView===key?"#1a1a18":"#888780",cursor:"pointer",fontWeight:activeView===key?600:400,borderRight:key==="courses"?"0.5px solid #d3d1c7":"none"}}>
              {label}{key==="report"&&flaggedCourses.length>0&&<span style={{marginLeft:6,background:R,color:"#fff",fontSize:10,padding:"1px 6px",borderRadius:8,fontWeight:700}}>{flaggedCourses.length}</span>}
            </button>
          ))}
        </div>

        {activeView==="report"&&(
          <div>
            <div className="filter-row" style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:12,color:"#888780"}}>Filter:</span>
              {[["all","All"],["critical","No contractors"],["low","Low coverage"],["moderate","Moderate"],["good","Good"]].map(([val,label])=>(
                <button key={val} onClick={()=>setFilterStatus(val)} style={{fontSize:12,padding:"5px 11px",borderRadius:5,border:`0.5px solid ${filterStatus===val?"#1a1a18":"#d3d1c7"}`,background:filterStatus===val?"#1a1a18":"#f5f5f3",color:filterStatus===val?"#fff":"#1a1a18",cursor:"pointer",fontWeight:filterStatus===val?600:400}}>
                  {label}
                </button>
              ))}
            </div>
            <div style={{overflowX:"auto",borderRadius:10,border:"0.5px solid #d3d1c7"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:700}}>
                <thead>
                  <tr style={{background:"#f5f5f3"}}>
                    {["#","Course","Status","Primary","Back-up","Total","★ Most Fit","Action"].map((h,i)=>(
                      <th key={h} style={{padding:"10px 13px",textAlign:i>2&&i<6?"center":"left",fontWeight:600,fontSize:11,color:"#888780",borderBottom:"1px solid #d3d1c7",whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:"0.04em"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {reportFiltered.map(({course,pal,total,primaryCount,backupCount,status,topNames,index},i)=>{
                    const cfg=STATUS_CONFIG[status];
                    return(
                      <tr key={course} style={{background:i%2===0?"#fff":"#f5f5f3",borderBottom:"0.5px solid #d3d1c7"}}>
                        <td style={{padding:"10px 13px",color:"#888780",fontSize:12}}>{index+1}</td>
                        <td style={{padding:"10px 13px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{width:9,height:9,borderRadius:"50%",background:pal.border,flexShrink:0}}/>
                            <span style={{fontWeight:600}}>{course}</span>
                          </div>
                        </td>
                        <td style={{padding:"10px 13px"}}>
                          <span style={{fontSize:11,padding:"3px 10px",borderRadius:10,background:cfg.bg,color:cfg.color,fontWeight:600,border:`0.5px solid ${cfg.border}`,whiteSpace:"nowrap"}}>{cfg.label}</span>
                        </td>
                        <td style={{padding:"10px 13px",textAlign:"center",fontWeight:700,color:primaryCount===0?R:G}}>{primaryCount}</td>
                        <td style={{padding:"10px 13px",textAlign:"center",fontWeight:700,color:backupCount===0?R:B}}>{backupCount}</td>
                        <td style={{padding:"10px 13px",textAlign:"center",fontWeight:800,color:total===0?R:total<=LOW?AM:G,fontSize:15}}>{total}</td>
                        <td style={{padding:"10px 13px"}}>
                          {topNames.length>0
                            ?<div style={{display:"flex",flexDirection:"column",gap:3}}>
                                {topNames.map(n=><span key={n} style={{fontSize:11,padding:"2px 9px",borderRadius:10,background:pal.border,color:"#fff",fontWeight:700,whiteSpace:"nowrap",width:"fit-content"}}>★ {n}</span>)}
                              </div>
                            :<span style={{color:"#888780"}}>—</span>
                          }
                        </td>
                        <td style={{padding:"10px 13px"}}>
                          <span style={{fontSize:12,color:cfg.color,fontWeight:status==="critical"||status==="low"?600:400}}>{cfg.action}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {reportFiltered.length===0&&<p style={{fontSize:13,color:"#888780",padding:"14px"}}>No courses match the selected filter.</p>}
            </div>
          </div>
        )}

        {activeView==="courses"&&(<>
          <div style={{...card,marginBottom:14}}>
            <p style={{fontSize:11,fontWeight:600,margin:"0 0 9px",color:"#888780",textTransform:"uppercase",letterSpacing:"0.05em"}}>Filters</p>
            <div className="filter-row" style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <div style={{display:"flex",borderRadius:7,overflow:"hidden",border:"0.5px solid #d3d1c7"}}>
                {[["all","All"],["primary","Primary"],["backup","Back-up"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setFilterType(val)} style={{fontSize:12,padding:"6px 12px",border:"none",background:filterType===val?"#fff":"#f5f5f3",color:filterType===val?"#1a1a18":"#888780",cursor:"pointer",fontWeight:filterType===val?600:400,borderRight:val!=="backup"?"0.5px solid #d3d1c7":"none"}}>
                    {label}
                  </button>
                ))}
              </div>
              <select value={filterCourse} onChange={e=>setFilterCourse(e.target.value)} style={{fontSize:12,padding:"6px 10px",borderRadius:7,border:"0.5px solid #d3d1c7",background:"#f5f5f3",color:"#1a1a18",cursor:"pointer"}}>
                <option value="all">All courses</option>
                {result.courses.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <input value={filterContractor} onChange={e=>setFilterContractor(e.target.value)} placeholder="Search contractor or keyword…"
                style={{fontSize:12,padding:"6px 11px",borderRadius:7,border:"0.5px solid #d3d1c7",background:"#f5f5f3",color:"#1a1a18",outline:"none",flex:1,minWidth:150}}/>
              {(filterType!=="all"||filterCourse!=="all"||filterContractor)&&(
                <button onClick={()=>{setFilterType("all");setFilterCourse("all");setFilterContractor("");}} style={{fontSize:12,padding:"6px 11px",borderRadius:7,border:"0.5px solid #d3d1c7",background:"#f5f5f3",color:"#888780",cursor:"pointer"}}>Clear</button>
              )}
            </div>
            <p style={{fontSize:11,color:"#888780",margin:"7px 0 0"}}>{shown.length} contractor{shown.length!==1?"s":""} shown</p>
          </div>

          {courseGroups.map(({course,pal,contractors,totalCount,status})=>{
            const collapsed=!!collapsedGroups[course];
            const cfg=STATUS_CONFIG[status];
            if(contractors.length===0&&filterContractor)return null;
            const sorted=[...contractors].sort((a,b)=>((topFit[course]||[]).includes(b.email)?1:0)-((topFit[course]||[]).includes(a.email)?1:0));
            return(
              <div key={course} style={{marginBottom:14}}>
                <div onClick={()=>toggleGroup(course)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderRadius:9,marginBottom:collapsed?0:9,background:pal.bg,border:`2px solid ${pal.border}`,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:pal.border,flexShrink:0}}/>
                    <span style={{fontWeight:700,fontSize:15,color:pal.text}}>{course}</span>
                    <span style={{fontSize:12,color:pal.text,opacity:0.7}}>{contractors.length} shown · {totalCount} total</span>
                    <span style={{fontSize:11,padding:"2px 9px",borderRadius:4,background:cfg.bg,color:cfg.color,fontWeight:600,border:`0.5px solid ${cfg.border}`}}>{cfg.label}</span>
                  </div>
                  <span style={{fontSize:13,color:pal.text}}>{collapsed?"▼":"▲"}</span>
                </div>
                {!collapsed&&contractors.length===0&&(
                  <div style={{padding:"11px 14px",borderRadius:8,background:RL,border:"0.5px solid #f09595",fontSize:13,color:R,marginBottom:4}}>
                    No contractors match this course with the current filters.
                  </div>
                )}
                {!collapsed&&sorted.map(c=><ContractorRow key={c.email} c={c} pal={pal} groupKey={course}/>)}
              </div>
            );
          })}
        </>)}
      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
